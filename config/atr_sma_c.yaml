strategy:
  name: ATR-SMA-C
  version: "1.0"
  description: >
    ATR-band SMA trend-following on EQQQ with trend-strength alt rotation.
    Exit EQQQ when close drops below SMA ATR band.
    Rotate into strongest-trending alt asset, or cash when none qualifies.

parameters:
  sma_window: 15        # SMA lookback in trading days
  atr_window: 14        # ATR lookback in trading days
  atr_multiplier: 0.3   # band width = ATR/Close * multiplier
  cash_rate_annual: 0.02

universe:
  main_ticker: EQQQ
  alt_tickers:
    - IUES
    - IGLN
    - IBZL
    - EEA
    - IUCS
  safe_ticker: SEGA     # treated as one of the alts; cash is the final fallback

# IBKR contract specifications per ticker.
# Verify these with IBKR Symbol Lookup (https://www.interactivebrokers.com/en/trading/symbol-search.php)
# sec_type: ETF for exchange-traded funds, STK for stocks
# exchange:  LSE (London), AEB (Amsterdam), IBIS (Xetra), SMART (auto-route)
# currency:  Currency of the specific share class you hold
contracts:
  EQQQ:
    sec_type: STK
    exchange: SMART
    currency: GBP
  IUES:
    sec_type: STK
    exchange: SMART
    currency: GBP
  IGLN:
    sec_type: STK
    exchange: SMART
    currency: GBP
  IBZL:
    sec_type: STK
    exchange: SMART
    currency: GBP
  EEA:
    sec_type: STK
    exchange: SMART
    currency: GBP
  IUCS:
    sec_type: STK
    exchange: SMART
    currency: GBP
  SEGA:
    sec_type: STK
    exchange: SMART
    currency: EUR
